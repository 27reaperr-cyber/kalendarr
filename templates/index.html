<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Календарь</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="screen">
    <section class="profile-block">
      <div class="avatar-holder">
        <img id="userAvatar" alt="User avatar" hidden>
        <div id="userAvatarFallback" class="avatar-fallback" hidden></div>
      </div>

      <h1 id="userTitle">@username</h1>

      <p class="profile-description">
        Управляйте задачами и напоминаниями прямо в Telegram.
        <a id="botLink" href="https://t.me/kolendarbot" target="_blank" rel="noopener noreferrer">Перейти в бота</a>
      </p>
    </section>

    <section class="search-block">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="search" placeholder="Search" autocomplete="off">
    </section>

    <section class="list-block">
      <div class="section-head">
        <h2>Мои задачи</h2>
        <span id="tasksCount" class="count-pill">0</span>
      </div>

      <button id="createTaskBtn" class="create-row" type="button">
        <span class="plus-circle">+</span>
        <span>Создать новую задачу</span>
      </button>

      <div id="tasksList" class="task-list"></div>
      <div id="emptyState" class="empty-state" hidden>По вашему запросу задач не найдено</div>
    </section>
  </main>

  <section id="editorSheet" class="editor-sheet" hidden>
    <div id="sheetBackdrop" class="sheet-backdrop"></div>
    <div id="sheetPanel" class="sheet-panel" role="dialog" aria-modal="true" aria-label="Редактор задачи">
      <div class="sheet-handle"></div>
      <h3 id="editorTitle">Новая задача</h3>

      <div class="form-grid">
        <label>
          <span>Текст</span>
          <input id="taskText" type="text" maxlength="500" placeholder="Например: Встреча с командой">
        </label>

        <label>
          <span>Дата и время</span>
          <input id="taskDatetime" type="datetime-local" step="60">
        </label>

        <label>
          <span>Часовой пояс</span>
          <input id="timezoneInput" type="text" placeholder="Europe/Moscow" autocomplete="off" spellcheck="false">
          <small class="tz-hint">
            По умолчанию: UTC, <a id="timezoneBotLink" href="https://t.me/kolendarbot" target="_blank" rel="noopener noreferrer">измените в боте</a>
          </small>
        </label>
      </div>

      <div class="sheet-actions">
        <button id="saveTaskBtn" type="button" class="action primary">Сохранить</button>
        <button id="cancelEditBtn" type="button" class="action ghost">Отмена</button>
        <button id="deleteTaskBtn" type="button" class="action danger" hidden>Удалить</button>
      </div>
    </div>
  </section>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <template id="taskRowTemplate">
    <article class="task-row">
      <div class="task-row-avatar"></div>
      <button class="task-row-main" type="button">
        <span class="task-row-title"></span>
        <span class="task-row-subtitle"></span>
      </button>
      <button class="task-row-arrow" type="button" aria-label="Открыть">›</button>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
