<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Календарь</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="container">
    <header class="hero card">
      <div class="hero-head">
        <div>
          <h1>Календарь @kolendarbot</h1>
          <p>Планируйте задачи и получайте напоминания вовремя</p>
        </div>
        <span class="chip" id="tasksCount">0 задач</span>
      </div>

      <section class="profile">
        <div class="avatar-wrap">
          <img id="userAvatar" alt="Avatar" hidden>
          <div id="userAvatarFallback" class="avatar-fallback">TG</div>
        </div>
        <div class="profile-info">
          <strong id="userName">Пользователь Telegram</strong>
          <span id="userUsername">@username</span>
          <span id="userTariff" class="chip chip-soft">Бесплатный тариф</span>
          <span id="timezoneCurrent" class="tz-line">Текущий пояс: -</span>
        </div>
      </section>
    </header>

    <nav class="tabs card" aria-label="Вкладки">
      <button id="tabAddBtn" type="button" class="tab-btn active" data-tab="add">Добавить</button>
      <button id="tabTasksBtn" type="button" class="tab-btn" data-tab="tasks">Задачи</button>
    </nav>

    <section id="loadingBar" class="loading-bar" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <span>Загрузка...</span>
      <span class="loading-shimmer" aria-hidden="true"></span>
    </section>

    <section id="tabsViewport" class="tabs-viewport">
      <section id="tabAdd" class="tab-panel active" aria-labelledby="tabAddBtn">
        <section class="card">
          <h2>Часовой пояс</h2>
          <div class="row timezone-row">
            <input id="timezoneInput" type="text" placeholder="Например: Europe/Moscow" autocomplete="off" spellcheck="false">
            <button id="saveTimezoneBtn" type="button">Сохранить</button>
          </div>
          <small id="timezoneHint">Можно изменить здесь или отправить геопозицию в боте через 📎 → Геопозиция.</small>
        </section>

        <section class="card">
          <h2 id="formTitle">Новая задача</h2>
          <div class="column">
            <input id="taskText" type="text" maxlength="500" placeholder="Текст задачи">
            <input id="taskDatetime" type="datetime-local" step="60">
            <div class="row" id="editActions" hidden>
              <button id="cancelEditBtn" type="button" class="ghost">Отмена редактирования</button>
            </div>
          </div>
        </section>
      </section>

      <section id="tabTasks" class="tab-panel" aria-labelledby="tabTasksBtn" hidden>
        <section class="card">
          <div class="row header-row">
            <h2>Список задач</h2>
            <button id="refreshBtn" type="button" class="ghost">Обновить</button>
          </div>
          <div id="tasks" class="tasks"></div>
          <div id="emptyState" class="status" hidden>Пока нет задач</div>
        </section>
      </section>
    </section>
  </main>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <template id="taskTemplate">
    <article class="task-card">
      <div class="task-content">
        <h3 class="task-title"></h3>
        <p class="task-time"></p>
      </div>
      <div class="task-actions">
        <button type="button" data-action="edit">Редактировать</button>
        <button type="button" data-action="delete" class="danger">Удалить</button>
      </div>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
