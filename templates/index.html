<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Календарь</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="profile-head">
      <div class="avatar-wrap">
        <img id="userAvatar" alt="Avatar" hidden>
        <div id="userAvatarFallback" class="avatar-fallback">TG</div>
      </div>
      <h1 id="userTitle">@username</h1>
      <p class="profile-desc">
        Управляйте задачами и напоминаниями прямо в Telegram.
        <a id="botLink" href="https://t.me/kolendarbot" target="_blank" rel="noopener noreferrer">Перейти в бота</a>
      </p>
    </header>

    <section class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="search" placeholder="Search" autocomplete="off">
    </section>

    <section class="list-wrap">
      <h2>Мои задачи</h2>
      <button id="createTaskBtn" class="create-row" type="button">
        <span class="plus">＋</span>
        <span>Создать новую задачу</span>
      </button>

      <div id="tasksList" class="task-list"></div>
      <div id="emptyState" class="empty" hidden>По вашему запросу задач не найдено</div>
    </section>

    <section id="editorCard" class="editor" hidden>
      <h3 id="editorTitle">Новая задача</h3>
      <div class="editor-grid">
        <label>
          <span>Текст</span>
          <input id="taskText" type="text" maxlength="500" placeholder="Например: Позвонить клиенту">
        </label>

        <label>
          <span>Дата и время</span>
          <input id="taskDatetime" type="datetime-local" step="60">
        </label>

        <label>
          <span>Часовой пояс</span>
          <input id="timezoneInput" type="text" placeholder="Europe/Moscow" autocomplete="off" spellcheck="false">
        </label>
      </div>

      <div class="editor-actions">
        <button id="saveTaskBtn" type="button">Сохранить</button>
        <button id="cancelEditBtn" type="button" class="ghost">Отмена</button>
        <button id="deleteTaskBtn" type="button" class="danger" hidden>Удалить</button>
      </div>
    </section>
  </main>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <template id="taskRowTemplate">
    <article class="task-row">
      <div class="task-avatar"></div>
      <button class="task-main" type="button">
        <span class="task-title"></span>
        <span class="task-sub"></span>
      </button>
      <button class="task-edit" type="button" aria-label="Редактировать">›</button>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
